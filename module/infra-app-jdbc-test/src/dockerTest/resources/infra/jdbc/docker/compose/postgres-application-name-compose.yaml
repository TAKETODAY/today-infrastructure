services:
  database:
    image: '{imageName}'
    ports:
      - '5432'
    environment:
      - 'POSTGRES_USER=myuser'
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
    labels:
      infra.jdbc.parameters: 'ApplicationName=spring+boot'
      infra.r2dbc.parameters: 'applicationName=spring boot'
