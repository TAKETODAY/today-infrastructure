description = "Infra Flyway integration"

apply plugin: "infra.building.docker-test"

dependencies {
  api(project(":infra-context"))
  api(project(":infra-jdbc"))
  api(project(":module:infra-sql"))

  api("org.flywaydb:flyway-core")

  optional("org.flywaydb:flyway-database-oracle")
  optional("org.flywaydb:flyway-database-postgresql")
  optional("org.flywaydb:flyway-sqlserver")

  optional("org.testcontainers:testcontainers-jdbc")
  optional(project(":infra-testcontainers"))

  annotationProcessor(project(":infra-build:infra-configuration-processor"))
  annotationProcessor(project(":infra-build:infra-annotation-config-processor"))

  dockerTestImplementation(project(":module:infra-app-test"))
  dockerTestImplementation(project(":module:infra-app-jdbc-test"))
  dockerTestImplementation(project(":infra-test-support"))
  dockerTestImplementation(testFixtures(project(":module:infra-docker-compose")))
  dockerTestImplementation("org.testcontainers:testcontainers-junit-jupiter")
  dockerTestImplementation("org.testcontainers:testcontainers-postgresql")
  dockerTestRuntimeOnly("org.postgresql:postgresql")

  testImplementation(project(":module:infra-app-test"))
  testImplementation(project(":infra-test-support"))
  testImplementation(project(":infra-core-test"))

  testImplementation("org.hibernate.orm:hibernate-core")
  testImplementation("org.hsqldb:hsqldb")
  testImplementation("org.postgresql:postgresql")
  testImplementation(testFixtures(project(":infra-app")))

  testRuntimeOnly("ch.qos.logback:logback-classic")
  testRuntimeOnly("com.h2database:h2")
  testRuntimeOnly("com.zaxxer:HikariCP")
  testRuntimeOnly("org.flywaydb:flyway-database-hsqldb")
}
