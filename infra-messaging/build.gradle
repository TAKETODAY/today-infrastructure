description = "Infra Messaging"

apply plugin: "com.google.protobuf"

protobuf {
  protoc {
    artifact = "com.google.protobuf:protoc:$protobufVersion"
  }
}

configurations.testCompileProtoPath.extendsFrom(configurations.dependencyManagement)
configurations.compileProtoPath.extendsFrom(configurations.dependencyManagement)

dependencies {
  api(project(":infra-beans"))
  api(project(":infra-core"))
  compileOnly("jakarta.validation:jakarta.validation-api")
  compileOnly("com.google.code.findbugs:jsr305")
  optional(project(":infra-context"))
  optional(project(":infra-oxm"))
  optional("com.google.code.gson:gson")
  optional("com.google.protobuf:protobuf-java-util")
  optional("io.projectreactor.netty:reactor-netty-http")
  optional("io.rsocket:rsocket-core")
  optional("io.rsocket:rsocket-transport-netty")
  optional("jakarta.json.bind:jakarta.json.bind-api")
  optional("jakarta.xml.bind:jakarta.xml.bind-api")
  optional("tools.jackson.core:jackson-databind")

  testImplementation(project(":infra-core-test"))
  testImplementation(testFixtures(project(":infra-core")))
  testImplementation("com.thoughtworks.xstream:xstream")
  testImplementation("io.projectreactor:reactor-test")
  testImplementation("io.reactivex.rxjava3:rxjava")
  testImplementation("jakarta.inject:jakarta.inject-tck")
  testImplementation("jakarta.validation:jakarta.validation-api")
  testImplementation("org.apache.activemq:activemq-broker")
  testImplementation("org.apache.activemq:activemq-kahadb-store")
  testImplementation("org.apache.activemq:activemq-stomp")
  testImplementation("org.skyscreamer:jsonassert")
  testImplementation("org.xmlunit:xmlunit-assertj")
  testImplementation("org.xmlunit:xmlunit-matchers")
  testRuntimeOnly(project(":infra-context"))
  testRuntimeOnly("com.sun.activation:jakarta.activation")
  testRuntimeOnly("com.sun.xml.bind:jaxb-core")
  testRuntimeOnly("com.sun.xml.bind:jaxb-impl")
  testRuntimeOnly("jakarta.json:jakarta.json-api")
  testRuntimeOnly("org.eclipse:yasson")
}
